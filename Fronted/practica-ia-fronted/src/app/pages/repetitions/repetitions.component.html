<section class="page-header">
  <div>
    <span class="eyebrow">Repitencias</span>
    <h2>Control de repitencias académicas</h2>
    <p>Revisa las materias cursadas más de una vez y las recomendaciones asociadas.</p>
  </div>
</section>

<mat-card class="panel">
  <mat-card-content>
    <div class="table-wrap" *ngIf="!isLoading; else loading">
      <table mat-table [dataSource]="items" class="mat-elevation-z1">
        <ng-container matColumnDef="curso">
          <th mat-header-cell *matHeaderCellDef>Curso</th>
          <td mat-cell *matCellDef="let item">{{ item.curso }}</td>
        </ng-container>

        <ng-container matColumnDef="vecesCursado">
          <th mat-header-cell *matHeaderCellDef>Veces cursado</th>
          <td mat-cell *matCellDef="let item">{{ item.vecesCursado }}</td>
        </ng-container>

        <ng-container matColumnDef="ultimoEstado">
          <th mat-header-cell *matHeaderCellDef>Último estado</th>
          <td mat-cell *matCellDef="let item">{{ item.ultimoEstado }}</td>
        </ng-container>

        <ng-container matColumnDef="recomendacion">
          <th mat-header-cell *matHeaderCellDef>Recomendación</th>
          <td mat-cell *matCellDef="let item">{{ item.recomendacion }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>

    <ng-template #loading>
      <div class="loading">
        <mat-progress-spinner diameter="42" mode="indeterminate"></mat-progress-spinner>
        <span>Cargando repitencias...</span>
      </div>
    </ng-template>
  </mat-card-content>
</mat-card>
